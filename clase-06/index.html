<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmetiquera Harry Potter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>

    <div class="container">
        <h1 class="my-4 text-center">Cosmetiquera Harry Potter</h1>

        <!-- Contenedor del producto -->
        <div class="row">
            <div class="col-md-6">
                <!-- Galería de imágenes -->
                <div id="product-gallery">
                    <img id="main-image" src="https://via.placeholder.com/400x400.png?text=Producto" alt="Cosmetiquera" class="img-fluid mb-3">
                    <div class="row">
                        <div class="col-4">
                            <img src="https://via.placeholder.com/100x100.png?text=Imagen1" alt="Imagen 1" class="img-thumbnail" onclick="changeImage('https://via.placeholder.com/400x400.png?text=Producto')">
                        </div>
                        <div class="col-4">
                            <img src="https://via.placeholder.com/100x100.png?text=Imagen2" alt="Imagen 2" class="img-thumbnail" onclick="changeImage('https://via.placeholder.com/400x400.png?text=Imagen+2')">
                        </div>
                        <div class="col-4">
                            <img src="https://via.placeholder.com/100x100.png?text=Imagen3" alt="Imagen 3" class="img-thumbnail" onclick="changeImage('https://via.placeholder.com/400x400.png?text=Imagen+3')">
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <h3>Precio: <span id="price">$22,705</span></h3>
                <p>Cosmetiquera unicolor con arte de Harry Potter. Perfecta para tus productos de belleza.</p>

                <!-- Selección de color -->
                <div>
                    <label for="color">Color:</label>
                    <select id="color" class="form-control mb-3" onchange="updatePrice()">
                        <option value="22,705">Azul Intenso</option>
                        <option value="21,500">Negro</option>
                        <option value="23,000">Gris Claro</option>
                    </select>
                </div>

                <!-- Selección de talla -->
                <div>
                    <label for="size">Tamaño:</label>
                    <select id="size" class="form-control mb-3">
                        <option value="M">M</option>
                        <option value="L">L</option>
                        <option value="S">S</option>
                    </select>
                </div>

                <!-- Botón de añadir al carrito -->
                <button class="btn btn-dark" onclick="addToCart()">Añadir al carrito</button>
            </div>
        </div>
    </div>

    <script src="./js/script.js"></script>
</body>
</html>
